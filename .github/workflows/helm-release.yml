name: Helm Release

on:
  push:
    tags:
      - 'helm-v*'

defaults:
  run:
    working-directory: helm

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci
        working-directory: helm

      - name: Build package
        run: npm run build
        working-directory: helm

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: helm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: helm/RELEASE_NOTES.md
          name: Helm ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
